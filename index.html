<style>
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: #F5EFE2; }
body { font-family: 'Inter', -apple-system, sans-serif; -webkit-font-smoothing: antialiased; }
button { font: inherit; cursor: pointer; border: none; background: none; padding: 0; color: inherit; }
input, textarea, select { font: inherit; color: inherit; }
img { max-width: 100%; display: block; }
a { color: inherit; text-decoration: none; }
.img-placeholder { position: relative; overflow: hidden; background: var(--ph-bg, #ddd); }
.img-placeholder::before { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(135deg, transparent 0 14px, var(--ph-stripe, rgba(0,0,0,0.06)) 14px 15px); pointer-events: none; }
.img-placeholder .ph-label { position: absolute; bottom: 12px; left: 14px; font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ph-label, rgba(0,0,0,0.5)); background: var(--ph-label-bg, rgba(255,255,255,0.7)); padding: 4px 8px; border-radius: 2px; backdrop-filter: blur(4px); }
@keyframes mq { from { transform: translateX(0) } to { transform: translateX(-50%) } }

@media (min-width: 769px) { .hamburger { display: none !important; } }
.service-card {
  background: #F5EFE2;
  border: 1px solid rgba(27,58,75,0.16);
  border-radius: 16px;
  padding: 18px;
  min-height: 140px;
  transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease, color 0.18s ease;
  color: #1B3A4B;
  text-align: left;
}
.service-card:hover,
.service-card:focus-visible {
  background: #1B3A4B;
  border-color: transparent;
  transform: translateY(-2px);
  color: #F5EFE2;
}
.service-card:hover .service-title,
.service-card:focus-visible .service-title {
  color: #F5EFE2;
}
.service-card:hover .service-meta,
.service-card:focus-visible .service-meta {
  color: rgba(245,239,226,0.9);
}
.service-card p {
  opacity: 0.85;
  margin: 0;
}
.service-card:hover p,
.service-card:focus-visible p {
  opacity: 0.95;
}
@media (max-width: 768px) {
  /* Prevent all horizontal overflow */
  html, body {
    overflow-x: hidden !important;
    max-width: 100vw !important;
  }
  
  * {
    max-width: 100% !important;
  }
  
  /* Navigation */
  .nav-inner { 
    padding: 12px 20px !important;
  }
  .nav-links { display: none !important; }
  
  /* Hero - prioridade mobile */
  .hero-wrap { 
    padding: 20px 20px 40px !important;
  }
  
  .hero-grid { 
    grid-template-columns: 1fr !important;
    gap: 24px !important;
  }
  
  .hero-img { 
    display: block !important;
    margin: 0 -20px 16px !important;
    order: -1;
  }
  
  .hero-img img { 
    height: 240px !important;
    width: calc(100% + 40px) !important;
    max-width: none !important;
    object-fit: cover !important;
  }
  
  /* About section */
  .about-grid { 
    grid-template-columns: 1fr !important;
    gap: 24px !important;
  }
  
  /* Stats grid - 2 colunas sem cortar */
  .stats-grid { 
    grid-template-columns: 1fr 1fr !important;
    gap: 0 !important;
    width: 100% !important;
  }
  
  .stats-grid > div { 
    padding: 18px 12px !important;
    min-height: 100px !important;
    border-right: 1px solid rgba(27,58,75,0.16) !important;
    border-bottom: 1px solid rgba(27,58,75,0.16) !important;
  }
  
  .stats-grid > div:nth-child(2n) { 
    border-right: none !important;
  }
  
  .stats-grid > div:nth-child(3),
  .stats-grid > div:nth-child(4) { 
    border-bottom: none !important;
  }
  
  .stat-n { 
    font-size: 22px !important;
    line-height: 1.1 !important;
    white-space: normal !important;
  }
  
  /* About text columns */
  .about-text {
    columns: 1 !important;
    column-gap: 0 !important;
  }
  
  /* Services */
  .services-grid { 
    grid-template-columns: 1fr !important;
    gap: 16px !important;
  }
  
  /* Gallery - 1 coluna em mobile */
  .dishes-grid { 
    grid-template-columns: 1fr !important;
    grid-auto-rows: 240px !important;
    gap: 12px !important;
  }
  
  .dishes-grid > div { 
    grid-column: span 1 !important;
    grid-row: span 1 !important;
  }
  
  .hero-actions { 
    display: flex !important;
    flex-direction: column !important;
    gap: 12px !important;
  }
  .hero-actions > button {
    width: 100% !important;
    max-width: 100% !important;
  }
  
  /* Booking section */
  .booking-grid {
    grid-template-columns: 1fr !important;
    gap: 32px !important;
  }
  
  .booking-img {
    order: -1;
    margin: 0 -20px !important;
  }
  
  .booking-img img {
    height: 240px !important;
    width: calc(100% + 40px) !important;
    max-width: none !important;
  }
  
  /* Footer */
  footer { 
    padding: 20px 20px !important;
  }
  
  /* Typography mobile */
  h1, .heading-xl { 
    font-size: clamp(32px, 8vw, 56px) !important;
    line-height: 0.95 !important;
  }
  
  h2, .heading-section { 
    font-size: clamp(28px, 7vw, 48px) !important;
    line-height: 1 !important;
  }
  
  /* General spacing */
  section {
    padding-left: 20px !important;
    padding-right: 20px !important;
  }
}
</style>

// ── NAV ──────────────────────────────────────────────────────
function LangToggle({ lang, setLang }) {
  return (
    <div style={{ display: 'inline-flex', alignItems: 'center', border: `1px solid ${T.fg}`, borderRadius: 999, padding: 2, fontSize: 11, letterSpacing: '0.08em', textTransform: 'uppercase', fontWeight: 600 }}>
      {['pt','en'].map(l => (
        <button key={l} onClick={() => setLang(l)} style={{ padding: '5px 11px', borderRadius: 999, background: lang===l ? T.fg : 'transparent', color: lang===l ? T.bg : T.fg, transition: 'all 0.18s' }}>{l.toUpperCase()}</button>
      ))}
    </div>
  );
}

function Nav({ lang, setLang, scrolled, sections }) {
  const [menuOpen, setMenuOpen] = React.useState(false);
  const goTo = (i) => {
    const el = sections.current[i + 1];
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    setMenuOpen(false);
  };
  return (
    <>
    <nav style={{ position: 'sticky', top: 0, zIndex: 50, background: scrolled ? 'rgba(245,239,226,0.92)' : T.bg, backdropFilter: scrolled ? 'blur(14px)' : 'none', borderBottom: `1px solid ${scrolled ? T.line : 'transparent'}`, transition: 'all 0.25s' }}>
      <div className="nav-inner" style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: scrolled ? '14px 44px' : '22px 44px', transition: 'padding 0.25s' }}>
        <button onClick={() => window.scrollTo({top:0,behavior:'smooth'})} style={{ fontFamily: T.cond, fontSize: 20, fontWeight: 700, letterSpacing: '0.02em', color: T.fg }}>
          Julia Raposo<span style={{ color: T.green }}>.</span>
        </button>
        <div style={{ display: 'flex', alignItems: 'center', gap: 24 }}>
          <ul className="nav-links" style={{ listStyle: 'none', display: 'flex', gap: 28, margin: 0, padding: 0 }}>
            {COPY.nav[lang].map((label, i) => (
              <li key={label}>
                <button onClick={() => goTo(i)} style={{ fontSize: 13, fontWeight: 500, paddingBottom: 4, color: T.fg, borderBottom: '1px solid transparent', transition: 'all 0.18s' }}
                  onMouseEnter={e => e.currentTarget.style.borderBottomColor = T.salmon}
                  onMouseLeave={e => e.currentTarget.style.borderBottomColor = 'transparent'}>
                  {label}
                </button>
              </li>
            ))}
          </ul>
          <LangToggle lang={lang} setLang={setLang} />
          <button onClick={() => setMenuOpen(o => !o)} style={{ display: 'flex', flexDirection: 'column', gap: 5, padding: 4, cursor: 'pointer' }} className="hamburger">
            <span style={{ display:'block', width:22, height:2, background: T.fg }} />
            <span style={{ display:'block', width:22, height:2, background: T.fg }} />
            <span style={{ display:'block', width:22, height:2, background: T.fg }} />
          </button>
        </div>
      </div>
    </nav>
    {menuOpen && (
      <div style={{ position:'fixed', inset:0, zIndex:49, background:'rgba(245,239,226,0.97)', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:32 }}>
        {COPY.nav[lang].map((label, i) => (
          <button key={label} onClick={() => goTo(i)} style={{ fontFamily: T.cond, fontSize:36, fontWeight:700, textTransform:'uppercase', color: T.fg, letterSpacing:'0.01em' }}>{label}</button>
        ))}
        <button onClick={() => setMenuOpen(false)} style={{ marginTop:20, fontFamily: T.mono, fontSize:11, letterSpacing:'0.14em', textTransform:'uppercase', opacity:0.5 }}>fechar ×</button>
      </div>
    )}
    </>

}

// ── HERO ─────────────────────────────────────────────────────

// ── APP ──────────────────────────────────────────────────────
function App() {
  const [lang, setLang] = React.useState('pt');
  const [scrolled, setScrolled] = React.useState(false);
  const sectionRefs = React.useRef([]);

  React.useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 40);
    window.addEventListener('scroll', onScroll);
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  const setRef = (i) => (el) => { sectionRefs.current[i] = el; };
  
  const goToSection = (i) => {
    const el = sectionRefs.current[i];
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  };

  return (
    <div style={{ background: T.bg, color: T.fg }}>
      <Nav lang={lang} setLang={setLang} scrolled={scrolled} sections={sectionRefs} />
      <div ref={setRef(0)}><Hero lang={lang} onBookClick={() => goToSection(4)} onAboutClick={() => goToSection(1)} /></div>
      <div ref={setRef(1)}><About lang={lang} /></div>
      <div ref={setRef(2)}><Services lang={lang} /></div>
      <div ref={setRef(3)}><Gallery lang={lang} /></div>
      <div ref={setRef(4)}><Booking lang={lang} /></div>
      <Footer lang={lang} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
