<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Julia Raposo · Personal Chef · Rio de Janeiro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700&family=Inter:wght@300;400;500;600;700&family=Archivo+Narrow:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: #F5EFE2; }
body { font-family: 'Inter', -apple-system, sans-serif; -webkit-font-smoothing: antialiased; }
button { font: inherit; cursor: pointer; border: none; background: none; padding: 0; color: inherit; }
input, textarea, select { font: inherit; color: inherit; }
img { max-width: 100%; display: block; }
a { color: inherit; text-decoration: none; }
.img-placeholder { position: relative; overflow: hidden; background: var(--ph-bg, #ddd); }
.img-placeholder::before { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(135deg, transparent 0 14px, var(--ph-stripe, rgba(0,0,0,0.06)) 14px 15px); pointer-events: none; }
.img-placeholder .ph-label { position: absolute; bottom: 12px; left: 14px; font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ph-label, rgba(0,0,0,0.5)); background: var(--ph-label-bg, rgba(255,255,255,0.7)); padding: 4px 8px; border-radius: 2px; backdrop-filter: blur(4px); }
@keyframes mq { from { transform: translateX(0) } to { transform: translateX(-50%) } }

@media (min-width: 769px) { .hamburger { display: none !important; } }
.service-card {
  background: #F5EFE2;
  border: 1px solid rgba(27,58,75,0.16);
  border-radius: 16px;
  padding: 18px;
  min-height: 140px;
  transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease, color 0.18s ease;
  color: #1B3A4B;
  text-align: left;
}
.service-card:hover,
.service-card:focus-visible {
  background: #1B3A4B;
  border-color: transparent;
  transform: translateY(-2px);
  color: #F5EFE2;
}
.service-card:hover .service-title,
.service-card:focus-visible .service-title {
  color: #F5EFE2;
}
.service-card:hover .service-meta,
.service-card:focus-visible .service-meta {
  color: rgba(245,239,226,0.9);
}
.service-card p {
  opacity: 0.85;
  margin: 0;
}
.service-card:hover p,
.service-card:focus-visible p {
  opacity: 0.95;
}
@media (max-width: 768px) {
  /* Prevent all horizontal overflow */
  html, body {
    overflow-x: hidden !important;
    max-width: 100vw !important;
  }
  
  * {
    max-width: 100% !important;
  }
  
  /* Navigation */
  .nav-inner { 
    padding: 12px 20px !important;
  }
  .nav-links { display: none !important; }
  
  /* Hero - prioridade mobile */
  .hero-wrap { 
    padding: 20px 20px 40px !important;
  }
  
  .hero-grid { 
    grid-template-columns: 1fr !important;
    gap: 24px !important;
  }
  
  .hero-img { 
    display: block !important;
    margin: 0 -20px 16px !important;
    order: -1;
  }
  
  .hero-img img { 
    height: 240px !important;
    width: calc(100% + 40px) !important;
    max-width: none !important;
    object-fit: cover !important;
  }
  
  /* About section */
  .about-grid { 
    grid-template-columns: 1fr !important;
    gap: 24px !important;
  }
  
  /* Stats grid - 2 colunas sem cortar */
  .stats-grid { 
    grid-template-columns: 1fr 1fr !important;
    gap: 0 !important;
    width: 100% !important;
  }
  
  .stats-grid > div { 
    padding: 18px 12px !important;
    min-height: 100px !important;
    border-right: 1px solid rgba(27,58,75,0.16) !important;
    border-bottom: 1px solid rgba(27,58,75,0.16) !important;
  }
  
  .stats-grid > div:nth-child(2n) { 
    border-right: none !important;
  }
  
  .stats-grid > div:nth-child(3),
  .stats-grid > div:nth-child(4) { 
    border-bottom: none !important;
  }
  
  .stat-n { 
    font-size: 22px !important;
    line-height: 1.1 !important;
    white-space: normal !important;
  }
  
  /* Services */
  .services-grid { 
    grid-template-columns: 1fr !important;
    gap: 16px !important;
  }
  
  /* Gallery - 1 coluna em mobile */
  .dishes-grid { 
    grid-template-columns: 1fr !important;
    grid-auto-rows: 180px !important;
    gap: 10px !important;
  }
  
  .dishes-grid > div { 
    grid-column: span 1 !important;
    grid-row: span 1 !important;
  }
  
  .hero-actions { 
    display: flex !important;
    flex-wrap: wrap !important;
    gap: 12px !important;
  }
  .hero-actions > button {
    flex: 1 1 calc(50% - 6px) !important;
    min-width: 150px !important;
  }
  
  /* Footer */
  .footer-wrap { 
    padding: 36px 20px 20px !important;
  }
  
  .footer-info { 
    flex-direction: column !important;
    gap: 4px !important;
    line-height: 1.6 !important;
  }
  
  .footer-dot { 
    display: none !important;
  }
  
  /* Typography mobile */
  h1, .heading-xl { 
    font-size: clamp(32px, 8vw, 56px) !important;
    line-height: 0.95 !important;
  }
  
  h2, .heading-section { 
    font-size: clamp(28px, 7vw, 48px) !important;
    line-height: 1 !important;
  }
  
  /* General spacing */
  section {
    padding-left: 20px !important;
    padding-right: 20px !important;
  }
}
</style>
</head>

// ── NAV ──────────────────────────────────────────────────────
function LangToggle({ lang, setLang }) {
  return (
    <div style={{ display: 'inline-flex', alignItems: 'center', border: `1px solid ${T.fg}`, borderRadius: 999, padding: 2, fontSize: 11, letterSpacing: '0.08em', textTransform: 'uppercase', fontWeight: 600 }}>
      {['pt','en'].map(l => (
        <button key={l} onClick={() => setLang(l)} style={{ padding: '5px 11px', borderRadius: 999, background: lang===l ? T.fg : 'transparent', color: lang===l ? T.bg : T.fg, transition: 'all 0.18s' }}>{l.toUpperCase()}</button>
      ))}
    </div>
  );
}

function Nav({ lang, setLang, scrolled, sections }) {
  const [menuOpen, setMenuOpen] = React.useState(false);
  const goTo = (i) => {
    const el = sections.current[i + 1];
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    setMenuOpen(false);
  };
  return (
    <>
    <nav style={{ position: 'sticky', top: 0, zIndex: 50, background: scrolled ? 'rgba(245,239,226,0.92)' : T.bg, backdropFilter: scrolled ? 'blur(14px)' : 'none', borderBottom: `1px solid ${scrolled ? T.line : 'transparent'}`, transition: 'all 0.25s' }}>
      <div className="nav-inner" style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: scrolled ? '14px 44px' : '22px 44px', transition: 'padding 0.25s' }}>
        <button onClick={() => window.scrollTo({top:0,behavior:'smooth'})} style={{ fontFamily: T.cond, fontSize: 20, fontWeight: 700, letterSpacing: '0.02em', color: T.fg }}>
          Julia Raposo<span style={{ color: '#B8860B' }}>.</span>
        </button>
        <div style={{ display: 'flex', alignItems: 'center', gap: 24 }}>
          <ul className="nav-links" style={{ listStyle: 'none', display: 'flex', gap: 28, margin: 0, padding: 0 }}>
            {COPY.nav[lang].map((label, i) => (
              <li key={label}>
                <button onClick={() => goTo(i)} style={{ fontSize: 13, fontWeight: 500, paddingBottom: 4, color: T.fg, borderBottom: '1px solid transparent', transition: 'all 0.18s' }}
                  onMouseEnter={e => e.currentTarget.style.borderBottomColor = T.salmon}
                  onMouseLeave={e => e.currentTarget.style.borderBottomColor = 'transparent'}>
                  {label}
                </button>
              </li>
            ))}
          </ul>
          <LangToggle lang={lang} setLang={setLang} />
          <button onClick={() => setMenuOpen(o => !o)} style={{ display: 'flex', flexDirection: 'column', gap: 5, padding: 4, cursor: 'pointer' }} className="hamburger">
            <span style={{ display:'block', width:22, height:2, background: T.fg }} />
            <span style={{ display:'block', width:22, height:2, background: T.fg }} />
            <span style={{ display:'block', width:22, height:2, background: T.fg }} />
          </button>
        </div>
      </div>
    </nav>
    {menuOpen && (
      <div style={{ position:'fixed', inset:0, zIndex:49, background:'rgba(245,239,226,0.97)', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:32 }}>
        {COPY.nav[lang].map((label, i) => (
          <button key={label} onClick={() => goTo(i)} style={{ fontFamily: T.cond, fontSize:36, fontWeight:700, textTransform:'uppercase', color: T.fg, letterSpacing:'0.01em' }}>{label}</button>
        ))}
        <button onClick={() => setMenuOpen(false)} style={{ marginTop:20, fontFamily: T.mono, fontSize:11, letterSpacing:'0.14em', textTransform:'uppercase', opacity:0.5 }}>fechar ×</button>
      </div>
    )}
    </>
  );
}

// ── HERO ─────────────────────────────────────────────────────
function Hero({ lang, onBookClick, onAboutClick }) {
  const c = COPY.hero[lang];
  return (
    <header style={{ position: 'relative', background: T.bg, padding: '30px 56px 60px' }} className="hero-wrap">
      <div style={{ paddingBottom: 20, borderBottom: `1px solid ${T.line}`, display: 'flex', justifyContent: 'space-between', fontFamily: T.mono, fontSize: 11, letterSpacing: '0.18em', textTransform: 'uppercase', color: T.soft, fontWeight: 500, flexWrap: 'wrap', gap: '8px 20px' }}>
        <span>{c.eyebrow}</span>
        <span>♦ Mercado Central · Bocado · Petí · MAM</span>
      </div>
      <div className="hero-grid" style={{ display: 'grid', gridTemplateColumns: '1.5fr 1fr', gap: 50, alignItems: 'center', paddingTop: 50 }}>
        <div>
          <div style={{ fontFamily: T.mono, fontSize: 12, letterSpacing: '0.22em', textTransform: 'uppercase', color: T.green, fontWeight: 600, marginBottom: 18 }}>
            {lang==='pt' ? 'Rio de Janeiro · Brasil' : 'Rio de Janeiro · Brazil'}
          </div>
          <h1 className="heading-xl" style={{ fontFamily: T.cond, fontSize: 'clamp(56px,8vw,120px)', lineHeight: 0.88, letterSpacing: '-0.02em', fontWeight: 700, margin: 0, textTransform: 'uppercase', color: T.green }}>
            <span style={{ color: T.green }}>JULIA</span><br />
            <span style={{ fontFamily: '"Bricolage Grotesque"', fontStyle: 'italic', fontWeight: 500, textTransform: 'none', letterSpacing: '-0.04em', color: T.fg }}>raposo.</span>
          </h1>
          <div style={{ marginTop: 24, fontFamily: '"Bricolage Grotesque"', fontStyle: 'italic', fontSize: 'clamp(17px,1.8vw,24px)', lineHeight: 1.3, letterSpacing: '-0.015em', color: T.fg, maxWidth: 560 }}>
            {lang==='pt' ? 'Cozinha autoral, raiz brasileira, técnica italiana.' : 'Signature cuisine, Brazilian roots, Italian technique.'}
          </div>
          <div className="hero-actions" style={{ marginTop: 32, display: 'flex', gap: 12, flexWrap: 'wrap' }}>
            <button onClick={onAboutClick} style={{ padding: '16px 24px', fontSize: 12, letterSpacing: '0.16em', textTransform: 'uppercase', fontWeight: 700, fontFamily: T.mono, border: `1.5px solid ${T.fg}`, color: T.fg, transition: 'all 0.18s' }}
              onMouseEnter={e => { e.currentTarget.style.background=T.fg; e.currentTarget.style.color=T.bg; }}
              onMouseLeave={e => { e.currentTarget.style.background='transparent'; e.currentTarget.style.color=T.fg; }}>
              {c.ghost}
            </button>
            <button onClick={onBookClick} style={{ padding: '16px 24px', fontSize: 12, letterSpacing: '0.16em', textTransform: 'uppercase', fontWeight: 700, fontFamily: T.mono, background: T.green, color: T.bg, display: 'inline-flex', alignItems: 'center', gap: 12, transition: 'background 0.18s' }}
              onMouseEnter={e => e.currentTarget.style.background=T.greenDeep}
              onMouseLeave={e => e.currentTarget.style.background=T.green}>
              {c.cta} <span>→</span>
            </button>
          </div>
        </div>
        <div className="hero-img" style={{ position: 'relative' }}>
          <img src="https://AFPMM.github.io/juliaraposo.com/hero.JPEG" alt="Julia Raposo" style={{ width: '100%', height: 460, objectFit: 'cover', display: 'block' }} />
        </div>
      </div>
    </header>
  );
}

// ── MARQUEE ──────────────────────────────────────────────────
function Marquee() {
  return (
    <div style={{ background: T.green, color: T.salmon, padding: '22px 0', overflow: 'hidden', borderTop: `1px solid ${T.greenDeep}`, borderBottom: `1px solid ${T.greenDeep}` }}>
      <div style={{ display: 'flex', gap: 42, whiteSpace: 'nowrap', fontFamily: T.cond, fontSize: 38, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.02em', animation: 'mq 32s linear infinite' }}>
        {[0,1].map(k => (
          <React.Fragment key={k}>
            <span>G20 · 2024</span><span style={{color:T.bg}}>◆</span>
            <span style={{fontStyle:'italic',fontFamily:T.serifIt,textTransform:'none',fontWeight:500}}>BRICS · 2025</span><span style={{color:T.bg}}>◆</span>
            <span>MAM RIO</span><span style={{color:T.bg}}>◆</span>
            <span>BOCADO · PETÍ</span><span style={{color:T.bg}}>◆</span>
            <span>MERCADO CENTRAL</span><span style={{color:T.bg}}>◆</span>
            <span style={{fontStyle:'italic',fontFamily:T.serifIt,textTransform:'none',fontWeight:500}}>cozinha autoral</span><span style={{color:T.bg}}>◆</span>
          </React.Fragment>
        ))}
      </div>
    </div>
  );
}

// ── ABOUT ────────────────────────────────────────────────────
function About({ lang }) {
  const c = COPY.about[lang];
  return (
    <section className="section-pad" style={{ padding: '90px 56px', background: T.bg, color: T.fg }}>
      <div className="about-grid" style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 70, marginBottom: 70 }}>
        <div>
          <div style={{ fontFamily: T.mono, fontSize: 11, letterSpacing: '0.18em', textTransform: 'uppercase', color: T.green, marginBottom: 20, fontWeight: 600 }}>{c.kicker}</div>
          <h2 style={{ fontFamily: T.cond, fontSize: 'clamp(56px,8vw,120px)', lineHeight: 0.88, letterSpacing: '-0.02em', fontWeight: 700, margin: 0, textTransform: 'uppercase', color: T.green }}>
            JULIA<br />
            <span style={{ fontFamily: '"Bricolage Grotesque"', fontStyle: 'italic', fontWeight: 500, textTransform: 'none', letterSpacing: '-0.04em', color: T.fg }}>raposo</span>

// ── APP ──────────────────────────────────────────────────────
function App() {
  const [lang, setLang] = React.useState('pt');
  const [scrolled, setScrolled] = React.useState(false);
  const sectionRefs = React.useRef([]);

  React.useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 40);
    window.addEventListener('scroll', onScroll);
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  const setRef = (i) => (el) => { sectionRefs.current[i] = el; };
  
  const goToSection = (i) => {
    const el = sectionRefs.current[i];
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  };

  return (
    <div style={{ background: T.bg, color: T.fg }}>
      <Nav lang={lang} setLang={setLang} scrolled={scrolled} sections={sectionRefs} />
      <div ref={setRef(0)}><Hero lang={lang} onBookClick={() => goToSection(4)} onAboutClick={() => goToSection(1)} /></div>
      <div ref={setRef(1)}><About lang={lang} /></div>
      <div ref={setRef(2)}><Services lang={lang} /></div>
      <div ref={setRef(3)}><Gallery lang={lang} /></div>
      <div ref={setRef(4)}><Booking lang={lang} /></div>
      <Footer lang={lang} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
